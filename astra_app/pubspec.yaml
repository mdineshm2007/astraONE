name: astra_app
description: "ASTRA – Solar Kart Team Management Platform. A complete team management system with role-based access control, task tracking, and secure communication."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  firebase_messaging: ^14.7.0
  
  # State Management
  provider: ^6.2.0
  
  # Local Storage
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Networking & HTTP
  http: ^1.1.0
  
  # Image Handling
  image_picker: ^1.0.4
  cached_network_image: ^3.3.1
  
  # UI/UX
  intl: ^0.19.0
  uuid: ^4.0.0
  
  # Utilities
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  
  # Error Handling & Logging
  logger: ^2.1.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
